*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'NeufileGrotesk', 'Segoe UI', system-ui, sans-serif; background: #DAC6C6; color: #3E0F00; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
#header { background: #3E0F00; color: #D1CCC7; padding: 0 32px; }
#header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 68px; }
#brand img { height: 28px; display: block; }
#nav { display: flex; gap: 6px; }
.nav-btn { padding: 8px 20px; border-radius: 4px; border: 1.5px solid transparent; font-weight: 500; font-size: 13px; letter-spacing: .3px; transition: all .2s; color: #D1CCC7; background: transparent; }
.nav-btn:hover { border-color: rgba(209,204,199,.3); }
.nav-btn.active { background: #F46C1E; color: #fff; border-color: #F46C1E; }
#app { max-width: 1100px; margin: 0 auto; padding: 36px 16px; }
.loading { text-align: center; padding: 80px 20px; color: #9B7B6F; font-size: 15px; }
.loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #955B1F; margin: 0 3px; animation: blink 1.2s infinite; }
.loading-dot:nth-child(2){ animation-delay:.2s; }
.loading-dot:nth-child(3){ animation-delay:.4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
.alert-info { background: #F5EFEB; border-radius: 6px; padding: 12px 14px; font-size: 13px; color: #7A5C4F; margin-bottom: 20px; border: 1px solid #C8B8B8; }
.alert-error { background: #FEE2E2; border-radius: 6px; padding: 12px 14px; font-size: 13px; color: #991B1B; margin-bottom: 20px; border: 1px solid #FCA5A5; }
.cal-wrap { background: #F5EFEB; border-radius: 6px; border: 1px solid #C8B8B8; overflow: hidden; }
.cal-header { background: #3E0F00; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
.cal-header h2 { color: #DAC6C6; font-size: 19px; font-weight: 500; letter-spacing: .5px; }
.cal-nav { background: rgba(218,198,198,.12); border: 1px solid rgba(218,198,198,.25); color: #DAC6C6; width: 36px; height: 36px; border-radius: 4px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.cal-nav:hover { background: rgba(218,198,198,.22); }
.cal-legend { padding: 14px 24px 10px; display: flex; gap: 24px; flex-wrap: wrap; border-bottom: 1px solid #C8B8B8; background: #EDE3DE; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #7A5C4F; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; }
.cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); padding: 14px 16px 4px; background: #EDE3DE; }
.cal-day-name { text-align: center; font-size: 11px; font-weight: 600; color: #9B7B6F; padding-bottom: 6px; letter-spacing: .6px; text-transform: uppercase; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 8px 16px 16px; gap: 5px; }
.cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 400; font-size: 14px; transition: all .15s; border: 1.5px solid transparent; position: relative; }
.cal-day.available { background: #fff; color: #3E0F00; border-color: #C8B8B8; cursor: pointer; }
.cal-day.available:hover { background: #F46C1E; color: #fff; border-color: #F46C1E; }
.cal-day.approved { background: #3E0F00; color: #DAC6C6; border-color: #3E0F00; cursor: default; }
.cal-day.pending { background: #955B1F; color: #F5EFEB; border-color: #955B1F; cursor: default; }
.cal-day.past { color: #B9A8A0; cursor: default; background: transparent; }
.cal-day.today { border-color: #F46C1E !important; font-weight: 700; }
.cal-dot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,.6); }
.modal-overlay { position: fixed; inset: 0; background: rgba(62,15,0,.55); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal { background: #F5EFEB; border-radius: 6px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(62,15,0,.25); }
.modal-header { background: #3E0F00; padding: 20px 24px; border-radius: 6px 6px 0 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { color: #DAC6C6; font-weight: 600; font-size: 16px; letter-spacing: .3px; }
.modal-subtitle { color: #9B7B6F; font-size: 13px; margin-top: 2px; }
.modal-close { background: rgba(218,198,198,.12); border: none; color: #DAC6C6; width: 32px; height: 32px; border-radius: 4px; font-size: 20px; line-height: 1; cursor: pointer; }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: #7A5C4F; margin-bottom: 5px; letter-spacing: .4px; text-transform: uppercase; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border-radius: 4px; border: 1.5px solid #C8B8B8; font-size: 14px; outline: none; background: #fff; font-family: inherit; color: #3E0F00; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #F46C1E; }
.form-error { font-size: 12px; color: #C0392B; margin-top: 4px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.btn { padding: 11px 20px; border-radius: 4px; border: none; font-weight: 600; font-size: 14px; font-family: inherit; letter-spacing: .2px; transition: all .15s; cursor: pointer; }
.btn-primary { background: #F46C1E; color: #fff; }
.btn-primary:hover { background: #d95e16; }
.btn-secondary { background: transparent; color: #3E0F00; border: 1.5px solid #C8B8B8; }
.btn-secondary:hover { border-color: #3E0F00; }
.btn-success { background: #3E0F00; color: #DAC6C6; }
.btn-danger { background: #C0392B; color: #fff; }
.btn-ghost { background: transparent; color: #9B7B6F; border: 1.5px solid #C8B8B8; }
.btn-dark { background: #3E0F00; color: #DAC6C6; }
.btn-full { width: 100%; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 3px; display: inline-block; letter-spacing: .3px; text-transform: uppercase; }
.badge-pending { background: #955B1F; color: #F5EFEB; }
.badge-approved { background: #3E0F00; color: #DAC6C6; }
.badge-rejected { background: #C8B8B8; color: #3E0F00; }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border-radius: 3px; border: 1.5px solid #C8B8B8; background: transparent; color: #7A5C4F; font-weight: 600; font-size: 12px; font-family: inherit; cursor: pointer; }
.filter-btn.active { border-color: #3E0F00; background: #3E0F00; color: #DAC6C6; }
.filter-btn:hover:not(.active) { border-color: #955B1F; color: #3E0F00; }
.booking-card { background: #F5EFEB; border-radius: 6px; padding: 16px 20px; border: 1px solid #C8B8B8; cursor: pointer; transition: all .15s; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.booking-card:hover { border-color: #955B1F; }
.booking-card.selected { border-color: #F46C1E; border-width: 1.5px; background: #FDF6F0; }
.booking-card-left { display: flex; align-items: center; gap: 14px; }
.booking-icon { width: 44px; height: 44px; border-radius: 4px; background: #EDE3DE; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #C8B8B8; }
.booking-name { font-weight: 600; color: #3E0F00; font-size: 15px; }
.booking-meta { font-size: 12px; color: #9B7B6F; margin-top: 2px; }
.empty-state { background: #F5EFEB; border-radius: 6px; padding: 48px 40px; text-align: center; color: #9B7B6F; border: 1px solid #C8B8B8; }
.detail-panel { background: #F5EFEB; border-radius: 6px; border: 1px solid #C8B8B8; overflow: hidden; }
.detail-center { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #C8B8B8; }
.detail-icon { font-size: 36px; margin-bottom: 8px; }
.detail-title { font-weight: 700; font-size: 18px; color: #3E0F00; }
.detail-type { color: #9B7B6F; font-size: 13px; margin-top: 2px; }
.detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #EDE3DE; font-size: 13px; }
.detail-key { color: #9B7B6F; }
.detail-val { font-weight: 600; color: #3E0F00; text-align: right; max-width: 180px; }
.admin-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 16px 16px; gap: 6px; }
.admin-cal-cell { min-height: 72px; border-radius: 4px; border: 1px solid #C8B8B8; padding: 6px; background: #fff; }
.admin-cal-cell.has-approved { background: #EDE3DE; }
.admin-cal-cell.has-pending { background: #F5E8DC; }
.admin-cal-cell.is-today { border: 2px solid #F46C1E; }
.admin-cal-day-num { font-size: 12px; color: #9B7B6F; margin-bottom: 4px; }
.admin-cal-day-num.today { font-weight: 700; color: #F46C1E; }
.admin-cal-event { border-radius: 3px; padding: 2px 5px; font-size: 10px; font-weight: 600; margin-bottom: 2px; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.admin-cal-more { font-size: 10px; color: #9B7B6F; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab-btn { padding: 8px 20px; border-radius: 4px; border: 1.5px solid #C8B8B8; font-weight: 600; font-size: 13px; font-family: inherit; background: transparent; color: #7A5C4F; cursor: pointer; }
.tab-btn.active { background: #3E0F00; color: #DAC6C6; border-color: #3E0F00; }
.tab-btn:hover:not(.active) { border-color: #955B1F; }
.admin-content { display: flex; gap: 20px; }
.admin-list { flex: 1; min-width: 0; }
.admin-detail { width: 380px; flex-shrink: 0; }
.admin-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
.admin-stat { background: #F5EFEB; border-radius: 6px; padding: 16px 18px; border: 1px solid #C8B8B8; }
.login-box { background: #F5EFEB; border-radius: 6px; padding: 48px 40px; border: 1px solid #C8B8B8; text-align: center; max-width: 380px; margin: 80px auto; }
.login-title { font-size: 20px; font-weight: 700; color: #3E0F00; margin-bottom: 6px; }
.login-sub { color: #9B7B6F; font-size: 14px; margin-bottom: 28px; }
.wa-confirm-msg { background:#fff; border:1px solid #C8B8B8; border-radius:6px; padding:16px; margin-bottom:20px; font-size:13px; color:#3E0F00; white-space:pre-wrap; line-height:1.8; }
.wa-box { background: #EDE3DE; border: 1px solid #C8B8B8; border-radius: 6px; padding: 20px; margin-top: 16px; }
.wa-box h3 { color: #3E0F00; font-size: 14px; margin-bottom: 10px; font-weight: 600; }
.wa-text { background: #fff; border-radius: 4px; padding: 12px; font-size: 13px; color: #3E0F00; white-space: pre-wrap; border: 1px solid #C8B8B8; margin-bottom: 12px; line-height: 1.6; }
.wa-btns { display: flex; gap: 10px; flex-wrap: wrap; }
@media (max-width: 700px) {
  .admin-stats { grid-template-columns: repeat(2,1fr); }
  .admin-content { flex-direction: column; }
  .admin-detail { width: 100%; }
  .form-row-2 { grid-template-columns: 1fr; }
  .form-row-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

var _cache = null;

function aa(){return localStorage.getItem(AK)==="1";}
function sa(v){v?localStorage.setItem(AK,"1"):localStorage.removeItem(AK);}
function pad(n){return String(n).padStart(2,"0");}
function ts(){var t=new Date();return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate());}
function fd(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){return new Date(y,m,1).getDay();}
function ei(t){return EI[t]||"&#127881;";}
function bc(s){return "badge badge-"+s;}
function bl(s){return {pending:"Pendente",approved:"Aprovado",rejected:"Recusado"}[s]||s;}
function sbg(s){return {pending:"#955B1F",approved:"#3E0F00",rejected:"#C8B8B8"}[s]||"#ccc";}
function stx(s){return {pending:"#F5EFEB",approved:"#DAC6C6",rejected:"#3E0F00"}[s]||"#000";}
function mkd(y,m,d){return y+"-"+pad(m+1)+"-"+pad(d);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function g(id){return document.getElementById(id);}

function showLoading(elId){
  var el=g(elId);
  if(el) el.innerHTML="<div class=\"loading\"><span class=\"loading-dot\"></span><span class=\"loading-dot\"></span><span class=\"loading-dot\"></span></div>";
}

function loadBins(cb){
  fetch(API_URL+"/latest",{headers:{"X-Master-Key":API_KEY}})
    .then(function(r){return r.json();})
    .then(function(d){
      var arr = Array.isArray(d.record) ? d.record : [];
      arr = arr.filter(function(b){return b && b.id;});
      _cache = arr;
      cb(null, arr);
    })
    .catch(function(e){cb(e, []);});
}

function saveBins(arr, cb){
  _cache = arr;
  fetch(API_URL,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify(arr)
  })
  .then(function(r){return r.json();})
  .then(function(){if(cb)cb(null);})
  .catch(function(e){if(cb)cb(e);});
}

    +"Data: "+fd(b.date)+"\n"
    +"Hor\u00e1rio: "+b.startTime+" \u00e0s "+b.endTime+"\n"
    +"Tipo: "+b.eventType+"\n"
    +"N\u00ba de convidados: "+b.guestCount+"\n\n"
    +"Por gentileza, verifique os dados acima e me avise caso haja qualquer informa\u00e7\u00e3o incorreta.\n\n"
    +"Fico \u00e0 disposi\u00e7\u00e3o para d\u00favidas ou informa\u00e7\u00f5es sobre nosso espa\u00e7o.\n\n"
    +"Nos vemos em breve,\nNathalia | \u00c1vira Inc.";
}

var cv="public";
function showView(v){
  cv=v;
  g("view-public").style.display=v==="public"?"":"none";
  g("view-admin").style.display=v==="admin"?"":"none";
  g("btn-public").className="nav-btn"+(v==="public"?" active":"");
  g("btn-admin").className="nav-btn"+(v==="admin"?" active":"");
  if(v==="public"){initPublicView();}else{if(!aa()){renderLogin();}else{initAdminView();}}
}

var py,pm;
function initPublicView(){
  var t=new Date(); py=t.getFullYear(); pm=t.getMonth();
  showLoading("view-public");
  loadBins(function(err,bks){renderPublic(bks);});
}

function renderPublic(bks){
  var aset={},pset={};
  bks.forEach(function(b){
    if(b.status==="approved") aset[b.date]=1;
    if(b.status==="pending")  pset[b.date]=1;
  });
  var td=dim(py,pm);
  var dnh=DN.map(function(d){return "<div class=\"cal-day-name\">"+d+"</div>";}).join("");
  var gh=pgrid(aset,pset,td);
  var h="<div class=\"cal-wrap\">"
   +"<div class=\"cal-header\">"
   +"<button class=\"cal-nav\" onclick=\"pubPrev()\">&#8249;</button>"
   +"<h2>"+MN[pm].toUpperCase()+" "+py+"</h2>"
   +"<button class=\"cal-nav\" onclick=\"pubNext()\">&#8250;</button>"
   +"</div>"
   +"<div class=\"cal-legend\">"
   +"<div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#3E0F00\"></div>Ocupado</div>"
   +"<div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#955B1F\"></div>Aguardando aprova\u00e7\u00e3o</div>"
   +"<div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:#fff;border:1px solid #C8B8B8\"></div>Dispon\u00edvel</div>"
   +"</div>"
   +"<div class=\"cal-days-header\">"+dnh+"</div>"
   +"<div class=\"cal-grid\">"+gh+"</div>"
   +"</div>"
   +"<div style=\"margin-top:20px;background:#F5EFEB;border-radius:6px;padding:20px 24px;border:1px solid #C8B8B8;font-size:13px;color:#7A5C4F;line-height:1.8\">"
   +"<strong style=\"color:#3E0F00;display:block;margin-bottom:4px\">Informa\u00e7\u00f5es</strong>"
   +"Para solicitar o agendamento do sal\u00e3o, entre em contato com a administra\u00e7\u00e3o da \u00c1vira Inc."
   +"</div>";
  g("view-public").innerHTML=h;
}

function pgrid(aset,pset,td){
  var first=fdm(py,pm),today=ts(),h="";
  for(var i=0;i<first;i++) h+="<div></div>";
  for(var d=1;d<=td;d++){
    var dstr=mkd(py,pm,d);
    var past=dstr<today,appr=!!aset[dstr],pend=!!pset[dstr],tot=dstr===today;
    var cls="cal-day";
    if(past) cls+=" past";
    else if(appr) cls+=" approved";
    else if(pend) cls+=" pending";
    else cls+=" available";
    if(tot) cls+=" today";
    var dot=(appr||pend)?"<div class=\"cal-dot\"></div>":"";
    h+="<div class=\""+cls+"\">"+d+dot+"</div>";
  }
  return h;
}

function pubPrev(){if(pm===0){pm=11;py--;}else pm--;showLoading("view-public");loadBins(function(e,bks){renderPublic(bks);});}
function pubNext(){if(pm===11){pm=0;py++;}else pm++;showLoading("view-public");loadBins(function(e,bks){renderPublic(bks);});}

var af="all",asel=null,atab="list",ay,am;

function initAdminView(){
  if(!aa()){renderLogin();return;}
  var t=new Date(); ay=t.getFullYear(); am=t.getMonth();
  showLoading("view-admin");
  loadBins(function(err,bks){renderAdmin(bks);});
}

function renderAdmin(bks){
  if(!aa()){renderLogin();return;}
  if(!bks) bks=_cache||[];
  var cnt={all:bks.length,
    pending:bks.filter(function(b){return b.status==="pending";}).length,
    approved:bks.filter(function(b){return b.status==="approved";}).length,
    rejected:bks.filter(function(b){return b.status==="rejected";}).length};
  var sh=[["Total",cnt.all,"#3E0F00"],["Pendentes",cnt.pending,"#955B1F"],["Aprovados",cnt.approved,"#3E0F00"],["Recusados",cnt.rejected,"#C8B8B8"]]
   .map(function(s){return "<div class=\"admin-stat\" style=\"border-left:3px solid "+s[2]+"\">"
     +"<div style=\"font-size:28px;font-weight:700;color:#3E0F00\">"+s[1]+"</div>"
     +"<div style=\"font-size:12px;color:#9B7B6F;margin-top:4px;text-transform:uppercase;letter-spacing:.4px\">"+s[0]+"</div>"
     +"</div>";}).join("");
  var h="<div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px\">"
   +"<div><h1 style=\"font-size:22px;font-weight:700;color:#3E0F00;letter-spacing:.3px\">Painel de Agendamentos</h1>"
   +"<p style=\"color:#9B7B6F;font-size:13px;margin-top:4px\">Sal\u00e3o de Festas \u00b7 \u00c1vira inc.</p></div>"
   +"<div style=\"display:flex;gap:8px;flex-wrap:wrap\">"
   +"<button class=\"btn btn-primary\" onclick=\"openNewBooking()\" style=\"font-size:12px;padding:8px 14px\">+ Nova solicita\u00e7\u00e3o</button>"
   +"<button class=\"btn btn-secondary\" onclick=\"refreshAdmin()\" style=\"font-size:12px;padding:8px 14px\">Atualizar</button>"
   +"<button class=\"btn btn-ghost\" onclick=\"adminLogout()\" style=\"font-size:12px;padding:8px 14px\">Sair</button>"
   +"</div></div>"
   +"<div class=\"admin-stats\">"+sh+"</div>"
   +"<div class=\"tabs\">"
   +"<button class=\"tab-btn"+(atab==="list"?" active":"")+"\" onclick=\"stab(\x27list\x27)\">Lista</button>"
   +"<button class=\"tab-btn"+(atab==="calendar"?" active":"")+"\" onclick=\"stab(\x27calendar\x27)\">Calend\u00e1rio</button>"
   +"</div>"
   +"<div id=\"atc\"></div>";
  g("view-admin").innerHTML=h;
  rat(bks);
}

function refreshAdmin(){showLoading("view-admin");loadBins(function(e,bks){asel=null;renderAdmin(bks);});}
function stab(t){atab=t;asel=null;rat(_cache||[]);}
function rat(bks){var el=g("atc");if(!el)return;bks=bks||_cache||[];atab==="list"?ral(el,bks):rac(el,bks);}

function ral(el,bks){
  var flt=bks.filter(function(b){return af==="all"||b.status===af;});
  flt.sort(function(a,b){return a.date>b.date?1:-1;});
  var cnt={all:bks.length,
    pending:bks.filter(function(b){return b.status==="pending";}).length,
    approved:bks.filter(function(b){return b.status==="approved";}).length,
    rejected:bks.filter(function(b){return b.status==="rejected";}).length};
  var frh=["all","pending","approved","rejected"].map(function(f){
    var lbl=f==="all"?"Todos ("+cnt.all+")":bl(f)+" ("+cnt[f]+")";
    return "<button class=\"filter-btn"+(af===f?" active":"")+"\" onclick=\"sf(\x27"+f+"\x27)\">"+lbl+"</button>";
  }).join("");
  var lh=flt.length===0
   ?"<div class=\"empty-state\"><p style=\"margin-bottom:8px\">\u2014</p><p>Nenhuma solicita\u00e7\u00e3o.<br><small style=\"color:#B9A8A0\">Use \"+ Nova solicita\u00e7\u00e3o\" para cadastrar.</small></p></div>"
   :flt.map(function(b){
     var sel=asel&&asel.id===b.id?" selected":"";
     return "<div class=\"booking-card"+sel+"\" onclick=\"selB(\x27"+b.id+"\x27)\">"
      +"<div class=\"booking-card-left\"><div class=\"booking-icon\">"+ei(b.eventType)+"</div>"
      +"<div><div class=\"booking-name\">"+esc(b.eventName)+"</div>"
      +"<div class=\"booking-meta\">"+fd(b.date)+" \u00b7 "+b.startTime+"\u2013"+b.endTime+" \u00b7 "+b.guestCount+" convidados</div></div></div>"
      +"<span class=\""+bc(b.status)+"\">"+bl(b.status)+"</span></div>";
   }).join("");
  var dh=asel?"<div class=\"admin-detail\">"+bdp(asel)+"</div>":"";
  el.innerHTML="<div class=\"filter-row\">"+frh+"</div><div class=\"admin-content\"><div class=\"admin-list\">"+lh+"</div>"+dh+"</div>";
}

function bdp(b){
  var ab;
  if(b.status==="pending"){
    ab="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px\">"
     +"<button class=\"btn btn-success\" onclick=\"doStatus(\x27"+b.id+"\x27,\x27approved\x27)\">Aprovar</button>"
     +"<button class=\"btn btn-danger\" onclick=\"doStatus(\x27"+b.id+"\x27,\x27rejected\x27)\">Recusar</button></div>";
  }else if(b.status==="approved"){
    ab="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px\">"
     +"<button class=\"btn btn-success\" onclick=\"waConfirmModal(\x27"+b.id+"\x27)\">&#128172; WhatsApp</button>"
     +"<button class=\"btn btn-danger\" onclick=\"doStatus(\x27"+b.id+"\x27,\x27rejected\x27)\">Cancelar</button></div>";
  }else{
    ab="<button class=\"btn btn-success btn-full\" style=\"margin-top:16px\" onclick=\"doStatus(\x27"+b.id+"\x27,\x27approved\x27)\">Aprovar</button>";
  }
  var rows=[["Data",fd(b.date)],["Hor\u00e1rio",b.startTime+" \u2013 "+b.endTime],["Convidados",b.guestCount],["Solicitante",b.name],["Telefone",b.phone],["E-mail",b.email||"\u2014"],["Obs.",b.notes||"\u2014"]]
   .map(function(r){return "<div class=\"detail-row\"><span class=\"detail-key\">"+r[0]+"</span><span class=\"detail-val\">"+esc(r[1])+"</span></div>";}).join("");
  return "<div class=\"detail-panel\">"
   +"<div class=\"modal-header\" style=\"border-radius:6px 6px 0 0\">"
   +"<div class=\"modal-title\">Detalhes</div>"
   +"<button class=\"modal-close\" onclick=\"desel()\">&#215;</button></div>"
   +"<div style=\"padding:24px\">"
   +"<div class=\"detail-center\"><div class=\"detail-icon\">"+ei(b.eventType)+"</div>"
   +"<div class=\"detail-title\">"+esc(b.eventName)+"</div>"
   +"<div class=\"detail-type\">"+esc(b.eventType)+"</div>"
   +"<span class=\""+bc(b.status)+"\" style=\"margin-top:8px\">"+bl(b.status)+"</span></div>"
   +rows+ab
   +"<button class=\"btn btn-danger btn-full\" style=\"margin-top:10px;font-size:13px\" onclick=\"delB(\x27"+b.id+"\x27)\">Excluir evento</button>"
   +"</div></div>";
}

function doStatus(id,status){
  var bks=(_cache||[]).map(function(b){return b.id===id?Object.assign({},b,{status:status}):b;});
  saveBins(bks,function(){
    if(asel&&asel.id===id) asel=Object.assign({},asel,{status:status});
    if(status==="approved"){
      var b=bks.find(function(x){return x.id===id;});
      if(b) waConfirmModal(b);
      else renderAdmin(bks);
    } else { renderAdmin(bks); }
  });
}

function waConfirmModal(idOrObj){
  var b=(typeof idOrObj==="string")?(_cache||[]).find(function(x){return x.id===idOrObj;}):idOrObj;
  if(!b) return;
  var msg=buildConfirmMsg(b);
  var phone=b.phone.replace(/[^0-9]/g,"");
  if(phone.length<=11) phone="55"+phone;
  var wal="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
  var h="<div class=\"modal-header\">"
   +"<div><div class=\"modal-title\">Enviar confirma\u00e7\u00e3o</div>"
   +"<div class=\"modal-subtitle\">"+esc(b.name)+" \u00b7 "+esc(b.phone)+"</div></div>"
   +"<button class=\"modal-close\" onclick=\"closeModal()\">&#215;</button>"
   +"</div>"
   +"<div class=\"modal-body\">"
   +"<div class=\"wa-confirm-msg\">"+esc(msg)+"</div>"
   +"<div style=\"background:#EDE3DE;border-radius:6px;padding:10px 14px;font-size:12px;color:#7A5C4F;margin-bottom:20px\">"
   +"Ser\u00e1 enviado para: <strong>"+esc(b.phone)+"</strong>"
   +"</div>"
   +"<div class=\"btn-row\">"
   +"<button class=\"btn btn-secondary\" onclick=\"closeModal()\">Fechar</button>"
   +"<button class=\"btn btn-success\" style=\"flex:2\" onclick=\"window.open(\x27"+wal+"\x27,\x27_blank\x27);closeModal()\">&#128172; Enviar WhatsApp</button>"
   +"</div>"
   +"<p style=\"font-size:11px;color:#B9A8A0;margin-top:12px;text-align:center\">O WhatsApp abrir\u00e1 com a mensagem pronta. S\u00f3 clicar em Enviar.</p>"
   +"</div>";
  g("modal-inner").innerHTML=h;
  g("modal").style.display="flex";
}

function rac(el,bks){
  var bd={};
  bks.forEach(function(b){if(!bd[b.date])bd[b.date]=[];bd[b.date].push(b);});
  var tot=dim(ay,am),first=fdm(ay,am),today=ts();
  var dnh=DN.map(function(d){return "<div class=\"cal-day-name\">"+d+"</div>";}).join("");
  var gh="";
  for(var i=0;i<first;i++)gh+="<div></div>";
  for(var d=1;d<=tot;d++){
    var dstr=mkd(ay,am,d);
    var db=bd[dstr]||[];
    var ha=db.some(function(b){return b.status==="approved";}),hp=db.some(function(b){return b.status==="pending";}),it=dstr===today;
    var cls="admin-cal-cell"+(ha?" has-approved":hp?" has-pending":"")+(it?" is-today":"");
    var eh=db.slice(0,2).map(function(b){
      return "<div class=\"admin-cal-event\" style=\"background:"+sbg(b.status)+";color:"+stx(b.status)+"\" onclick=\"csel(\x27"+b.id+"\x27)\">"+esc(b.eventName)+"</div>";
    }).join("")+(db.length>2?"<div class=\"admin-cal-more\">+"+(db.length-2)+" mais</div>":"");
    gh+="<div class=\""+cls+"\"><div class=\"admin-cal-day-num"+(it?" today":"")+"\">"+d+"</div>"+eh+"</div>";
  }
  el.innerHTML="<div class=\"cal-wrap\">"
   +"<div class=\"cal-header\">"
   +"<button class=\"cal-nav\" onclick=\"adminPrev()\">&#8249;</button>"
   +"<h2>"+MN[am].toUpperCase()+" "+ay+"</h2>"
   +"<button class=\"cal-nav\" onclick=\"adminNext()\">&#8250;</button>"
   +"</div>"
   +"<div class=\"cal-days-header\">"+dnh+"</div>"
   +"<div class=\"admin-cal-grid\">"+gh+"</div></div>";
}

function adminPrev(){if(am===0){am=11;ay--;}else am--;rat(_cache||[]);}
function adminNext(){if(am===11){am=0;ay++;}else am++;rat(_cache||[]);}
function csel(id){var b=(_cache||[]).find(function(x){return x.id===id;});if(!b)return;asel=b;atab="list";rat(_cache||[]);}
function selB(id){var b=(_cache||[]).find(function(x){return x.id===id;});asel=(asel&&asel.id===id)?null:b;ral(g("atc"),_cache||[]);}
function desel(){asel=null;ral(g("atc"),_cache||[]);}
function sf(f){af=f;asel=null;ral(g("atc"),_cache||[]);}

function delB(id){
  var bks=(_cache||[]).filter(function(b){return b.id!==id;});
  saveBins(bks,function(){asel=null;renderAdmin(bks);});
}

function openNewBooking(){
  var oh=ET.map(function(t){return "<option>"+t+"</option>";}).join("");
  var h="<div class=\"modal-header\">"
   +"<div><div class=\"modal-title\">Nova Solicita\u00e7\u00e3o</div><div class=\"modal-subtitle\">Cadastrar agendamento</div></div>"
   +"<button class=\"modal-close\" onclick=\"closeModal()\">&#215;</button>"
   +"</div>"
   +"<div class=\"modal-body\">"
   +"<div class=\"form-group\"><label class=\"form-label\">Data *</label><input class=\"form-input\" id=\"ndate\" type=\"date\" value=\""+ts()+"\"><div class=\"form-error\" id=\"ne-date\"></div></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">Nome completo *</label><input class=\"form-input\" id=\"nname\" type=\"text\"><div class=\"form-error\" id=\"ne-name\"></div></div>"
   +"<div class=\"form-row-2\">"
   +"<div class=\"form-group\"><label class=\"form-label\">Telefone *</label><input class=\"form-input\" id=\"nphone\" type=\"tel\"><div class=\"form-error\" id=\"ne-phone\"></div></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">E-mail</label><input class=\"form-input\" id=\"nemail\" type=\"email\"></div>"
   +"</div>"
   +"<div class=\"form-group\"><label class=\"form-label\">Tipo de evento</label><select class=\"form-select\" id=\"ntype\">"+oh+"</select></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">Nome do evento *</label><input class=\"form-input\" id=\"nevname\" type=\"text\"><div class=\"form-error\" id=\"ne-evname\"></div></div>"
   +"<div class=\"form-row-3\">"
   +"<div class=\"form-group\"><label class=\"form-label\">Convidados</label><input class=\"form-input\" id=\"nguests\" type=\"number\" min=\"1\" value=\"50\"></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">In\u00edcio</label><input class=\"form-input\" id=\"nstart\" type=\"time\" value=\"18:00\"></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">T\u00e9rmino</label><input class=\"form-input\" id=\"nend\" type=\"time\" value=\"23:00\"></div>"
   +"</div>"
   +"<div class=\"form-group\"><label class=\"form-label\">Observa\u00e7\u00f5es</label><textarea class=\"form-textarea\" id=\"nnotes\" rows=\"2\"></textarea></div>"
   +"<div class=\"form-group\"><label class=\"form-label\">Status</label>"
   +"<select class=\"form-select\" id=\"nstatus\"><option value=\"approved\">Aprovado</option><option value=\"pending\">Pendente</option></select></div>"
   +"<div id=\"nsave-error\"></div>"
   +"<div class=\"btn-row\">"
   +"<button class=\"btn btn-secondary\" onclick=\"closeModal()\">Cancelar</button>"
   +"<button class=\"btn btn-primary\" style=\"flex:2\" id=\"nsave-btn\" onclick=\"saveNewBooking()\">Salvar agendamento</button>"
   +"</div></div>";
  g("modal-inner").innerHTML=h;
  g("modal").style.display="flex";
}

function saveNewBooking(){
  var date=g("ndate").value,name=g("nname").value.trim(),phone=g("nphone").value.trim(),evname=g("nevname").value.trim();
  var ok=true;
  function se(id,m){g(id).textContent=m;ok=false;}
  function ce(id){g(id).textContent="";}
  ce("ne-date");ce("ne-name");ce("ne-phone");ce("ne-evname");
  if(!date)se("ne-date","Informe a data");
  if(!name)se("ne-name","Informe o nome");
  if(!phone)se("ne-phone","Informe o telefone");
  if(!evname)se("ne-evname","Informe o nome do evento");
  if(!ok)return;
  var btn=g("nsave-btn");
  if(btn){btn.textContent="Salvando...";btn.disabled=true;}
  var status=g("nstatus").value;
  var booking={id:Date.now().toString(),date:date,name:name,phone:phone,
    email:g("nemail").value.trim(),eventType:g("ntype").value,eventName:evname,
    guestCount:g("nguests").value||"?",startTime:g("nstart").value,
    endTime:g("nend").value,notes:g("nnotes").value.trim(),
    status:status,createdAt:new Date().toISOString()};
  var bks=(_cache||[]).slice();
  bks.push(booking);
  saveBins(bks,function(err){
    if(err){
      var e=g("nsave-error");
      if(e)e.innerHTML="<div class=\"alert-error\">Erro ao salvar. Verifique a conex\u00e3o.</div>";
      if(btn){btn.textContent="Salvar agendamento";btn.disabled=false;}
      return;
    }
    closeModal();
    if(status==="approved"){waConfirmModal(booking);}else{renderAdmin(bks);}
  });
}

function renderLogin(){
  g("view-admin").innerHTML=""
   +"<div style=\"padding:16px\"><div class=\"login-box\">"
   +"<div style=\"font-size:36px;margin-bottom:16px\">&#9672;</div>"
   +"<div class=\"login-title\">\u00c1rea Administrativa</div>"
   +"<div class=\"login-sub\">\u00c1vira inc. \u00b7 Sal\u00e3o de Festas</div>"
   +"<input type=\"password\" id=\"pwi\" class=\"form-input\" placeholder=\"Senha\" style=\"margin-bottom:8px\" onkeydown=\"if(event.key===\x27Enter\x27)doLogin()\">"
   +"<div id=\"pwe\" class=\"form-error\" style=\"margin-bottom:12px\"></div>"
   +"<button class=\"btn btn-dark btn-full\" onclick=\"doLogin()\">Entrar</button>"
   +"</div></div>";
}
function doLogin(){var pw=g("pwi")?g("pwi").value:"";if(pw===AP){sa(true);initAdminView();}else{var e=g("pwe");if(e)e.textContent="Senha incorreta.";}}
function adminLogout(){sa(false);renderLogin();}
function closeModal(){g("modal").style.display="none";}
function closeModalOutside(e){if(e.target.id==="modal")closeModal();}

// INIT — always start logged out
sa(false);
showLoading("view-public");
loadBins(function(err,bks){renderPublic(bks);});

</script>
